<!DOCTYPE html>
<html lang="tr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Enerji Analiz Pro - Cloud</title>
    
    <!-- PWA ve Mobil Uygulama Meta Etiketleri -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Enerji Panel">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#6366f1">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968517.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968517.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- FIREBASE SDK (Bulut Bağlantısı) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); }
        .stat-card { transition: transform 0.2s ease; }
        .stat-card:hover { transform: translateY(-5px); }
        #loading-overlay {
            position: fixed; inset: 0; z-index: 1000; 
            background: var(--bg, #f8fafc); 
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .dark #loading-overlay { background: #020617; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { primary: '#6366f1', secondary: '#a855f7', accent: '#f43f5e', darkBg: '#020617' } 
                } 
            }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- Yükleme Ekranı -->
    <div id="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm font-bold opacity-60 animate-pulse">Bulut Verileri Senkronize Ediliyor...</p>
        </div>
    </div>

    <nav class="p-4 border-b glass sticky top-0 z-50 flex justify-between items-center px-6">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-gradient-to-br from-primary to-secondary rounded-xl text-white shadow-lg">
                <i data-lucide="zap" class="w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Enerji Analiz <span class="text-primary font-extrabold italic">Sistemi</span></h1>
        </div>
        <button id="themeToggle" class="p-3 rounded-xl bg-slate-200 dark:bg-slate-800 hover:ring-2 ring-primary transition-all">
            <i data-lucide="sun" class="hidden dark:block text-yellow-400"></i>
            <i data-lucide="moon" class="block dark:hidden text-indigo-600"></i>
        </button>
    </nav>

    <main class="p-4 md:p-8 max-w-7xl mx-auto space-y-6">
        <div class="glass p-6 rounded-3xl shadow-xl grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider opacity-60 ml-1">Yıl Filtresi</label>
                <select id="yearFilter" class="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:border-primary outline-none transition-all cursor-pointer font-semibold"></select>
            </div>
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-wider opacity-60 ml-1">Ay Filtresi</label>
                <select id="monthFilter" class="w-full p-3 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:border-primary outline-none transition-all cursor-pointer font-semibold"></select>
            </div>
            <button onclick="openModal()" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all flex items-center justify-center gap-2 shadow-lg">
                <i data-lucide="edit-3" size="18"></i> Veriyi Düzenle
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="stat-card bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-3xl shadow-lg text-white h-36 flex flex-col justify-center">
                <p class="text-sm font-medium opacity-80">Toplam Ödeme</p>
                <h3 id="statTotal" class="text-3xl font-bold">₺0</h3>
            </div>
            <div class="stat-card bg-gradient-to-br from-purple-600 to-pink-700 p-6 rounded-3xl shadow-lg text-white h-36 flex flex-col justify-center">
                <p class="text-sm font-medium opacity-80">Aylık Ortalama</p>
                <h3 id="statAvg" class="text-3xl font-bold">₺0</h3>
            </div>
            <div class="stat-card bg-gradient-to-br from-orange-600 to-red-700 p-6 rounded-3xl shadow-lg text-white h-36 flex flex-col justify-center">
                <p class="text-sm font-medium opacity-80">En Yüksek</p>
                <h3 id="statMax" class="text-3xl font-bold">₺0</h3>
            </div>
            <div class="stat-card bg-gradient-to-br from-emerald-600 to-teal-700 p-6 rounded-3xl shadow-lg text-white h-36 flex flex-col justify-center">
                <p class="text-sm font-medium opacity-80">En Düşük</p>
                <h3 id="statMin" class="text-3xl font-bold">₺0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="glass p-6 rounded-3xl shadow-xl">
                <div class="flex items-center gap-2 mb-6 font-bold text-lg"><i data-lucide="line-chart" class="text-primary"></i> Yıllık Trend</div>
                <div class="h-80"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="glass p-6 rounded-3xl shadow-xl">
                <div class="flex items-center gap-2 mb-6 font-bold text-lg"><i data-lucide="bar-chart" class="text-primary"></i> Dağılım Analizi</div>
                <div class="h-80"><canvas id="monthlyChart"></canvas></div>
            </div>
        </div>

        <div class="glass rounded-3xl shadow-xl overflow-hidden">
            <div class="p-6 border-b dark:border-slate-800 flex justify-between items-center">
                <h3 class="font-bold text-lg flex items-center gap-2"><i data-lucide="table" class="text-primary"></i> Ödeme Detayları</h3>
                <span id="rowCount" class="text-xs font-bold bg-primary/10 text-primary px-3 py-1 rounded-full">0 Kayıt</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-100 dark:bg-slate-800/50 text-xs uppercase font-bold opacity-60">
                        <tr>
                            <th class="p-4">Ay</th>
                            <th class="p-4">Yıl</th>
                            <th class="p-4 text-right">Tutar</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="dataModal" class="fixed inset-0 bg-slate-900/60 hidden items-center justify-center z-[100] backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl shadow-2xl max-w-md w-full border dark:border-slate-700">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold">Veri Güncelleme</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold opacity-50">YIL</label>
                    <select id="modalYear" class="w-full p-3 rounded-xl border-2 dark:border-slate-700 dark:bg-slate-800 outline-none focus:border-primary"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold opacity-50">AY</label>
                    <select id="modalMonth" class="w-full p-3 rounded-xl border-2 dark:border-slate-700 dark:bg-slate-800 outline-none focus:border-primary"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold opacity-50">TUTAR (₺)</label>
                    <input type="number" id="modalAmount" class="w-full p-3 rounded-xl border-2 dark:border-slate-700 dark:bg-slate-800 outline-none focus:border-primary">
                </div>
                <button onclick="saveData()" class="w-full bg-primary text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-600 transition-all">Kaydet</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG (Bulut Bağlantısı) ---
        const firebaseConfig = {
            apiKey: "AIzaSyA5N2FSLqPicNeBaBi3Ehj0iPG6HOUD98",
            authDomain: "veriler-7a724.firebaseapp.com",
            databaseURL: "https://veriler-7a724-default-rtdb.firebaseio.com",
            projectId: "veriler-7a724",
            storageBucket: "veriler-7a724.appspot.com",
            messagingSenderId: "17059149175",
            appId: "1:17059149175:web:3bab6f4a5fece2819755"
        };

        // Firebase Başlatma
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const INITIAL_DATA = {
            "2017": {"Ocak": 0, "Şubat": 0, "Mart": 230, "Nisan": 143, "Mayıs": 140, "Haziran": 138, "Temmuz": 148, "Ağustos": 137, "Eylül": 127, "Ekim": 117, "Kasım": 150, "Aralık": 120},
            "2018": {"Ocak": 181, "Şubat": 207, "Mart": 159, "Nisan": 163, "Mayıs": 164, "Haziran": 172, "Temmuz": 118, "Ağustos": 164, "Eylül": 172, "Ekim": 171, "Kasım": 196, "Aralık": 225},
            "2019": {"Ocak": 220, "Şubat": 217, "Mart": 202, "Nisan": 220, "Mayıs": 199, "Haziran": 212, "Temmuz": 157, "Ağustos": 211, "Eylül": 198, "Ekim": 168, "Kasım": 251, "Aralık": 177},
            "2020": {"Ocak": 245, "Şubat": 235, "Mart": 242, "Nisan": 239, "Mayıs": 346, "Haziran": 236, "Temmuz": 238, "Ağustos": 272, "Eylül": 195, "Ekim": 219, "Kasım": 293, "Aralık": 275},
            "2021": {"Ocak": 315, "Şubat": 240, "Mart": 264, "Nisan": 320, "Mayıs": 241, "Haziran": 251, "Temmuz": 280, "Ağustos": 386, "Eylül": 380, "Ekim": 342, "Kasım": 343, "Aralık": 397},
            "2022": {"Ocak": 501, "Şubat": 452, "Mart": 593, "Nisan": 622, "Mayıs": 697, "Haziran": 402, "Temmuz": 438, "Ağustos": 489, "Eylül": 589, "Ekim": 636, "Kasım": 852, "Aralık": 670},
            "2023": {"Ocak": 753, "Şubat": 505, "Mart": 618, "Nisan": 586, "Mayıs": 459, "Haziran": 554, "Temmuz": 457, "Ağustos": 509, "Eylül": 334, "Ekim": 447, "Kasım": 439, "Aralık": 466},
            "2024": {"Ocak": 533, "Şubat": 411, "Mart": 279, "Nisan": 264, "Mayıs": 420, "Haziran": 497, "Temmuz": 821, "Ağustos": 621, "Eylül": 875, "Ekim": 703, "Kasım": 680, "Aralık": 806},
            "2025": {"Ocak": 654, "Şubat": 470, "Mart": 702, "Nisan": 549, "Mayıs": 608, "Haziran": 952, "Temmuz": 1064, "Ağustos": 1222, "Eylül": 1224, "Ekim": 911, "Kasım": 902, "Aralık": 790},
            "2026": {"Ocak": 722, "Şubat": 784, "Mart": 996, "Nisan": 0, "Mayıs": 0, "Haziran": 0, "Temmuz": 0, "Ağustos": 0, "Eylül": 0, "Ekim": 0, "Kasım": 0, "Aralık": 0}
        };

        const MONTHS = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        let appData = {};
        let trendChart, monthlyChart;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initFilters();
            initCharts();
            setupCloudSync();
            document.getElementById('themeToggle').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        });

        function initFilters() {
            const yFilter = document.getElementById('yearFilter'), mFilter = document.getElementById('monthFilter');
            const mYear = document.getElementById('modalYear'), mMonth = document.getElementById('modalMonth');
            yFilter.add(new Option("Tüm Yıllar", "ALL"));
            Object.keys(INITIAL_DATA).sort().forEach(y => { 
                yFilter.add(new Option(y, y)); mYear.add(new Option(y, y)); 
            });
            mFilter.add(new Option("Tüm Aylar", "ALL"));
            MONTHS.forEach(m => { 
                mFilter.add(new Option(m, m)); mMonth.add(new Option(m, m)); 
            });
            yFilter.value = "ALL"; mFilter.value = "ALL";
            yFilter.onchange = updateDashboard; mFilter.onchange = updateDashboard;
        }

        function initCharts() {
            const ctxT = document.getElementById('trendChart').getContext('2d');
            trendChart = new Chart(ctxT, {
                type: 'line',
                data: { labels: [], datasets: [{ label: '₺', data: [], borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(128,128,128,0.1)' } }, x: { grid: { display: false } } } }
            });

            const ctxM = document.getElementById('monthlyChart').getContext('2d');
            monthlyChart = new Chart(ctxM, {
                type: 'bar',
                data: { labels: [], datasets: [{ data: [], backgroundColor: ['#6366f1', '#a855f7', '#f43f5e', '#f59e0b', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899', '#f97316', '#84cc16', '#64748b'] }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(128,128,128,0.1)' } }, x: { grid: { display: false } } } }
            });
        }

        // --- BULUT SENKRONİZASYONU ---
        function setupCloudSync() {
            const dataRef = db.ref('payments');
            
            // Veritabanını Dinle (Realtime)
            dataRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    appData = data;
                } else {
                    // Veritabanı boşsa başlangıç verilerini yükle
                    saveToCloud(INITIAL_DATA);
                    appData = INITIAL_DATA;
                }
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);
                updateDashboard();
            });
        }

        function saveToCloud(data) {
            db.ref('payments').set(data);
        }

        function updateDashboard() {
            const selY = document.getElementById('yearFilter').value, selM = document.getElementById('monthFilter').value;
            let filtered = [];
            Object.keys(appData).forEach(y => {
                if (selY === "ALL" || selY === y) {
                    MONTHS.forEach(m => {
                        if (selM === "ALL" || selM === m) filtered.push({ y, m, val: appData[y][m] || 0 });
                    });
                }
            });

            const vals = filtered.filter(d => d.val > 0).map(d => d.val);
            const total = vals.reduce((a, b) => a + b, 0);
            document.getElementById('statTotal').innerText = `₺${total.toLocaleString()}`;
            document.getElementById('statAvg').innerText = `₺${vals.length ? (total/vals.length).toFixed(0).toLocaleString() : 0}`;
            document.getElementById('statMax').innerText = `₺${vals.length ? Math.max(...vals).toLocaleString() : 0}`;
            document.getElementById('statMin').innerText = `₺${vals.length ? Math.min(...vals).toLocaleString() : 0}`;
            document.getElementById('rowCount').innerText = `${filtered.length} Kayıt`;

            const years = Object.keys(appData).sort();
            trendChart.data.labels = years;
            trendChart.data.datasets[0].data = years.map(y => selM === "ALL" ? Object.values(appData[y]).reduce((a, b) => a + b, 0) : (appData[y][selM] || 0));
            trendChart.update();

            if (selY !== "ALL") {
                monthlyChart.data.labels = MONTHS;
                monthlyChart.data.datasets[0].data = MONTHS.map(m => appData[selY][m] || 0);
            } else {
                monthlyChart.data.labels = years;
                monthlyChart.data.datasets[0].data = years.map(y => selM === "ALL" ? Object.values(appData[y]).reduce((a, b) => a + b, 0) : (appData[y][selM] || 0));
            }
            monthlyChart.update();

            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';
            filtered.forEach(d => {
                tbody.innerHTML += `<tr class="hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"><td class="p-4 text-sm font-medium">${d.m}</td><td class="p-4 text-sm opacity-60">${d.y}</td><td class="p-4 text-sm text-right font-bold ${d.val === 0 ? 'opacity-30' : ''}">₺${d.val.toLocaleString()}</td></tr>`;
            });
        }

        function openModal() {
            document.getElementById('dataModal').classList.replace('hidden', 'flex');
            const y = document.getElementById('yearFilter').value === "ALL" ? Object.keys(appData)[0] : document.getElementById('yearFilter').value;
            const m = document.getElementById('monthFilter').value === "ALL" ? "Ocak" : document.getElementById('monthFilter').value;
            document.getElementById('modalYear').value = y;
            document.getElementById('modalMonth').value = m;
            document.getElementById('modalAmount').value = appData[y][m] || 0;
        }

        function closeModal() { document.getElementById('dataModal').classList.replace('flex', 'hidden'); }

        function saveData() {
            const y = document.getElementById('modalYear').value, m = document.getElementById('modalMonth').value, v = parseFloat(document.getElementById('modalAmount').value);
            if (isNaN(v)) return alert("Lütfen geçerli bir sayı girin.");

            // Bulut verisini güncelle
            appData[y][m] = v;
            saveToCloud(appData);
            
            closeModal();
        }
    </script>
</body>
</html>
